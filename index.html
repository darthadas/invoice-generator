<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Free Invoice Generator — No Signup Required</title>
  <meta name="description" content="Create and download professional invoices free. No signup, no ads, no limits. Simple online invoice generator.">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2052705064706779"
     crossorigin="anonymous"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #f0f0f0;
      padding: 30px 20px;
      color: #333;
    }
    .container { max-width: 750px; margin: 0 auto; }
    h1 { font-size: 1.6rem; margin-bottom: 6px; }
    .subtitle { color: #777; font-size: 0.9rem; margin-bottom: 24px; }

    .card {
      background: white;
      border-radius: 10px;
      padding: 24px;
      margin-bottom: 20px;
      border: 1px solid #e0e0e0;
    }
    .card h2 {
      font-size: 1rem;
      color: #555;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .row { display: flex; gap: 16px; margin-bottom: 12px; }
    .field { display: flex; flex-direction: column; flex: 1; }
    label { font-size: 0.8rem; color: #888; margin-bottom: 4px; }
    input {
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.95rem;
    }
    input:focus { outline: none; border-color: #4CAF50; }

    /* Items table */
    .items-header {
      display: grid;
      grid-template-columns: 3fr 1fr 1fr 40px;
      gap: 10px;
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 8px;
      padding: 0 4px;
    }
    .item-row {
      display: grid;
      grid-template-columns: 3fr 1fr 1fr 40px;
      gap: 10px;
      margin-bottom: 8px;
      align-items: center;
    }
    .item-row input { margin: 0; }
    .remove-btn {
      background: none;
      border: none;
      color: #e74c3c;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 0;
      text-align: center;
    }
    .add-btn {
      background: none;
      border: 1px dashed #ccc;
      border-radius: 6px;
      padding: 10px;
      width: 100%;
      cursor: pointer;
      color: #888;
      font-size: 0.9rem;
      margin-top: 8px;
      transition: border-color 0.2s;
    }
    .add-btn:hover { border-color: #4CAF50; color: #4CAF50; }

    .total-row {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 20px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 2px solid #f0f0f0;
      font-size: 1.1rem;
      font-weight: bold;
    }
    .total-amount { color: #4CAF50; font-size: 1.4rem; }

    .generate-btn {
      width: 100%;
      padding: 14px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .generate-btn:hover { background: #45a049; }

    /* Print styles */
    @media print {
      body { background: white; padding: 0; }
      .no-print { display: none !important; }
      .card { border: none; padding: 0; margin: 0; box-shadow: none; }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>🧾 Invoice Generator</h1>
  <p class="subtitle">Free. No signup. No limits. Download or print instantly.</p>

  <!-- Invoice Number -->
  <div class="card no-print">
    <h2>Invoice Number</h2>
    <div class="row">
      <div class="field">
        <label>Invoice Number</label>
        <input id="invoice" placeholder="INV">
      </div>
    </div>
  </div>

  <!-- From / To -->
  <div class="card no-print">
    <h2>From & To</h2>
    <div class="row">
      <div class="field">
        <label>Your Name / Business</label>
        <input id="fromName" placeholder="Name">
      </div>
      <div class="field">
        <label>Your Email</label>
        <input id="fromEmail" placeholder="username@email.com">
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label>Client Name</label>
        <input id="toName" placeholder="Client Name">
      </div>
      <div class="field">
        <label>Invoice Date</label>
        <input id="invoiceDate" type="date">
      </div>
    </div>
  </div>

  <!-- Items -->
  <div class="card no-print">
    <h2>Items</h2>
    <div class="items-header">
      <span>Description</span>
      <span>Qty</span>
      <span>Price</span>
      <span></span>
    </div>
    <div id="itemsContainer"></div>
    <button class="add-btn" onclick="addItem()">+ Add Item</button>
    <div class="total-row">
      <select id="currency" onchange="updateTotal()">
        <option value="$">USD $</option>
        <option value="€">EUR €</option>
        <option value="£">GBP £</option>
        <option value="Rs">LKR Rs</option>
      </select>
      <span>Total:</span>
      <span class="total-amount" id="totalAmount">$0.00</span>
    </div>
  </div>

  <!-- Actions -->
  <div class="no-print">
    <button class="generate-btn" onclick="downloadInvoice()">
      Download Invoice
    </button>
  </div>
  <br>
  <div class="no-print">
    <button class="generate-btn" onclick="printInvoice()">
      Print Invoice
    </button>
  </div>
</div>

<script>
  // Set today's date as default
  document.getElementById("invoiceDate").value =
    new Date().toISOString().split("T")[0];

  document.getElementById("invoice").value = "INV-" + Date.now().toString().slice(-6);

  // Add first item on load
  addItem();

  function addItem() {
    const container = document.getElementById("itemsContainer");
    const row = document.createElement("div");
    row.className = "item-row";
    row.innerHTML = `
      <input placeholder="Service or product description" oninput="updateTotal()">
      <input type="number" placeholder="1" min="1" value="1" oninput="updateTotal()">
      <input type="number" placeholder="0.00" min="0" step="0.01" oninput="updateTotal()">
      <button class="remove-btn" onclick="removeItem(this)">×</button>
    `;
    container.appendChild(row);
    updateTotal();
  }

  function removeItem(btn) {
    const rows = document.querySelectorAll(".item-row");
    if (rows.length === 1) return; // keep at least one row
    btn.parentElement.remove();
    updateTotal();
  }

  function updateTotal() {
    const currency = document.getElementById("currency").value;
    let total = 0;
    document.querySelectorAll(".item-row").forEach(row => {
      const inputs = row.querySelectorAll("input");
      const qty = parseFloat(inputs[1].value) || 0;
      const price = parseFloat(inputs[2].value) || 0;
      total += qty * price;
    });
    document.getElementById("totalAmount").innerText =
      currency + total.toFixed(2);
  }

  function generateInvoice() {
    const currency = document.getElementById("currency").value;
    const from = document.getElementById("fromName").value || "Your Name";
    const email = document.getElementById("fromEmail").value || "";
    const to = document.getElementById("toName").value || "Client Name";
    const date = document.getElementById("invoiceDate").value;
    const invoiceNum = document.getElementById("invoice").value;

    let itemRows = "";
    let total = 0;

    document.querySelectorAll(".item-row").forEach(row => {
      const inputs = row.querySelectorAll("input");
      const desc = inputs[0].value || "Service";
      const qty = parseFloat(inputs[1].value) || 0;
      const price = parseFloat(inputs[2].value) || 0;
      const subtotal = qty * price;
      total += subtotal;
      itemRows += `
        <tr>
          <td style="padding:10px;border-bottom:1px solid #f0f0f0">${desc}</td>
          <td style="padding:10px;border-bottom:1px solid #f0f0f0;text-align:center">${qty}</td>
          <td style="padding:10px;border-bottom:1px solid #f0f0f0;text-align:right">${currency}${price.toFixed(2)}</td>
          <td style="padding:10px;border-bottom:1px solid #f0f0f0;text-align:right">${currency}${subtotal.toFixed(2)}</td>
        </tr>`;
    });

    const invoiceHTML = `
      <!DOCTYPE html><html><head>
      <meta charset="UTF-8">
      <title>Invoice — ${to}</title>
      <style>
        body{font-family:Arial,sans-serif;max-width:700px;margin:40px auto;color:#333;padding:20px}
        .header{display:flex;justify-content:space-between;margin-bottom:40px}
        h1{color:#4CAF50;font-size:2rem}
        table{width:100%;border-collapse:collapse;margin-top:24px}
        th{background:#f9f9f9;padding:10px;text-align:left;border-bottom:2px solid #eee;font-size:0.85rem;color:#888}
        .total-section{text-align:right;margin-top:20px;font-size:1.2rem}
        .total-section strong{color:#4CAF50;font-size:1.5rem}
        .footer{margin-top:60px;color:#aaa;font-size:0.8rem;text-align:center}
      </style></head><body>
      <div class="header">
        <div><h1>INVOICE ${invoiceNum}</h1><p>${from}</p><p>${email}</p></div>
        <div style="text-align:right"><p><strong>Date:</strong> ${date}</p><p><strong>To:</strong> ${to}</p></div>
      </div>
      <table>
        <thead><tr>
          <th>Description</th><th style="text-align:center">Qty</th>
          <th style="text-align:right">Price</th><th style="text-align:right">Subtotal</th>
        </tr></thead>
        <tbody>${itemRows}</tbody>
      </table>
      <div class="total-section">Total: <strong>${currency}${total.toFixed(2)}</strong></div>
      <div class="footer">Generated with Adas's Tools — darthadas.github.io</div>
      </body></html>`;

    return invoiceHTML;
  }

  function downloadInvoice() {
    const date = document.getElementById("invoiceDate").value;
    const to = document.getElementById("toName").value || "Client Name";
    const invoiceHTML = generateInvoice();
    const blob = new Blob([invoiceHTML], {type: "text/html"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `invoice-${to.replace(/\s+/g, "-")}-${date}.html`;
    a.click();
    URL.revokeObjectURL(url);
  }

  function printInvoice() {
    const invoiceHTML = generateInvoice();
    const win = window.open();
    win.document.write(invoiceHTML);
    win.document.close();
    win.print();
  }
</script>
</body>
</html>
